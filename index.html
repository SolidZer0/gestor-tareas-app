<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestor de Tareas">
    <link rel="apple-touch-icon" href="https://es.pandora.net/favicon.ico">
    <title>Gestor de Tareas</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        box-sizing: border-box;
      }
      h2 {
        color: #333;
        text-align: center;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #666;
        font-weight: bold;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
      }
      /* Cambios aquí para el pad de firma */
      .canvas-container {
        width: 100%;
        background: #fafafa;
        border: 2px dashed #ccc;
        border-radius: 6px;
        overflow: hidden;
        line-height: 0; /* Evita espacios extra debajo del canvas */
      }
      #signature-pad {
        width: 100%; /* Ocupa todo el ancho del contenedor */
        height: 200px; /* Altura fija o relativa */
        cursor: crosshair;
        touch-action: none;
      }
      .canvas-error {
        border: 2px solid #dc3545 !important;
        background-color: #fff8f8 !important;
      }
      .btn-container {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
      }
      .btn-submit:hover {
        background-color: #218838;
      }
      .btn-clear {
        background-color: #dc3545;
        color: white;
      }
      .btn-clear:hover {
        background-color: #c82333;
      }
      .btn-clear-form {
        background-color: #007bff;
        color: white;
      }
      .btn-clear-form:hover {
        background-color: #0069d9;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid #28a745; /* El verde de tu app */
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📝 Gestor de Tareas</h2>
      <form id="taskForm">
        <div class="form-group">
          <label>Fecha de Hoy</label>
          <input type="date" id="todayDate" required /> <!-- Quizás que esto se rellene solo-->
        </div>
        <div class="form-group">
          <label>Nombre del Responsable</label>
          <input type="text" id="name" placeholder="Tu nombre..." required />
        </div>
        <div class="form-group">
          <label>Descripción de la Tarea</label>
          <textarea
            id="task"
            rows="4"
            placeholder="Descripción de la tarea"
            required
          ></textarea>
        </div>
        <div style="margin-bottom: 15px;">
          <label>Imagen:</label><br>
          <input type="file" id="photoInput" accept="image/*">
        </div>
        <div class="form-group">
          <label>Fecha de Entrega</label>
          <input type="date" id="dueDate" required />
        </div>
        <div class="form-group">
          <label>Firma Digital</label>
          <div class="canvas-container">
            <canvas id="signature-pad"></canvas>
          </div>
        </div>
        <div class="btn-container">
          <button type="button" class="btn-clear" onclick="clearSignature()">Limpiar Firma</button>
          <button type="submit" class="btn-submit">Enviar Datos</button>
        </div>
        <div class="btn-container">
          <button type="button" class="btn-clear-form" onclick="clearForm()">Nueva Tarea</button>
        </div>
      </form>
    </div>
    <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:sans-serif;">
      <div class="spinner"></div>
      <p style="margin-top:15px; font-weight:bold;">Enviando tarea...</p>
      <p style="font-size:0.8em; opacity:0.8;">Esto puede tardar unos segundos</p>
    </div>

      function blankSignature() {
        blankCanvasBase64 = canvas.toDataURL();
      }
      
      document.addEventListener("DOMContentLoaded", () => {          
          blankSignature();
      });

      document.getElementById("todayDate").valueAsDate = new Date();

      // Lógica del Canvas de Firma
      const canvas = document.getElementById("signature-pad");
      const ctx = canvas.getContext("2d");      

      let drawing = false;

      // Función para ajustar la resolución interna del canvas al tamaño visual
      function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        blankSignature();
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas(); // Llamada inicial

      function startDrawing(e) {
        drawing = true;
        draw(e);
      }

      function stopDrawing() {
        drawing = false;
        ctx.beginPath();
      }

      function draw(e) {
        if (!drawing) return;
        
        e.preventDefault(); // Evita el scroll mientras firmas en móvil
        
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";

        const rect = canvas.getBoundingClientRect();
        
        // Manejo mejorado de coordenadas para touch y mouse
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      }

      canvas.addEventListener("mousedown", startDrawing);
      canvas.addEventListener("mousemove", draw);
      window.addEventListener("mouseup", stopDrawing);
      
      canvas.addEventListener("touchstart", startDrawing, { passive: false });
      canvas.addEventListener("touchmove", draw, { passive: false });
      window.addEventListener("touchend", stopDrawing);

      function clearSignature() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      // Función auxiliar para convertir archivo a Base64
      const toBase64 = file => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = error => reject(error);
      });
      
      // Envío de datos corregido
      document.getElementById("taskForm").onsubmit = async (e) => {
        e.preventDefault();

        const signatureBase64 = canvas.toDataURL();
        if (signatureBase64 == blankCanvasBase64) {
          document.querySelector(".canvas-container").classList.add("canvas-error");
          alert("⚠️ Por favor, firma el documento antes de enviar.");
          return; // Detiene la ejecución aquí
        } else {
          document.querySelector(".canvas-container").classList.remove("canvas-error");
        }

        // --- MOSTRAR OVERLAY ---
        const overlay = document.getElementById("loadingOverlay");
        overlay.style.display = "flex";

        const photoInput = document.getElementById('photoInput');
        let photoBase64 = "";

        // Si hay una foto, la convertimos a base64
        if (photoInput.files.length > 0) {
            photoBase64 = await toBase64(photoInput.files[0]);
        }

        // Para que el ejemplo funcione, usaré los valores directos:
        const payload = {
          fechaHoy: document.getElementById("todayDate").value || new Date().toLocaleDateString(),
          nombre: document.getElementById("name").value,
          tarea: document.getElementById("task").value,
          foto: photoBase64,
          fechaEntrega: document.getElementById("dueDate").value,
          firma: signatureBase64
        };

        // REEMPLAZA ESTE URL con el de tu Google App Script
        const scriptURL = "https://script.google.com/macros/s/AKfycbwZwLwOh6pKkLYXoi_oUliSyyeLee9ewC3hbbsI1SHWXdS1rv_XYDc12E1E1do3Fjkw/exec";
        //const ID = "AKfycbwZwLwOh6pKkLYXoi_oUliSyyeLee9ewC3hbbsI1SHWXdS1rv_XYDc12E1E1do3Fjkw";
        try {
          const response = await fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          alert("Datos enviados con éxito");
        } catch (error) {
          alert("Error al enviar: " + error);
        } finally {
          // --- OCULTAR OVERLAY SIEMPRE AL FINAL ---
          overlay.style.display = "none";
        }
      };
      function clearForm() {
        if (confirm("¿Estás seguro de que quieres limpiar todo el formulario?")) {
          const form = document.getElementById("taskForm");
          
          // 1. Limpiamos los inputs de texto y selectores (excepto la fecha)
          // Suponiendo que tu input de fecha tiene el id "fechaRegistro"
          const inputs = form.querySelectorAll('input:not(#todayDate), textarea, select');
          inputs.forEach(input => input.value = "");

          // 2. Limpiamos el Canvas de la firma
          clearSignature();
          document.querySelector(".canvas-container").classList.remove("canvas-error");
          
          // 3. Resetear el input de archivo (importante)
          const photoInput = document.getElementById('photoInput');
          if (photoInput) photoInput.value = "";

          // 4. Si tienes un preview de la foto, también lo limpiamos
          /*const preview = document.getElementById('photoPreview'); // Ajusta el ID si tienes uno
          if (preview) preview.src = "";*/
        }
      }
    </script>
